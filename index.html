<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZSWolt | Official Links</title>
  <link rel="icon" type="https://raw.githubusercontent.com/ZonaShelWolt/Links/refs/heads/main/PFP.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
    body {
      font-family: 'Heebo', sans-serif;
      background: radial-gradient(circle at 15% 5%, rgba(239, 68, 68, 0.2) 0%, transparent 30%), radial-gradient(circle at 85% 10%, rgba(220, 38, 38, 0.2) 0%, transparent 30%), radial-gradient(circle at 10% 90%, rgba(185, 28, 28, 0.5) 0%, transparent 35%), radial-gradient(circle at 90% 90%, rgba(153, 27, 27, 0.4) 0%, transparent 35%), #0f172a;
      min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; color: white; position: relative;
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .live-ring { animation: pulseRing 1.5s ease-out infinite; }
    #spotlight { position: fixed; top: 0; left: 0; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 5; display: none; }
    .card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 10; padding: 1.5rem; text-align: center; }
    .card:hover { transform: translateY(-4px); background: rgba(30, 41, 59, 0.85); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4); }
    /* Links grid: narrow single column up to 7 links, wider balanced 2 columns when there are 8 or more */
    #links-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); max-width: 28rem; }
    #links-grid:has(> a:nth-child(8)) { grid-template-columns: repeat(2, minmax(0, 1fr)); max-width: 56rem; }
    #profile-image:hover { transform: scale(1.05) rotate(1deg); border-color: #ef4444; box-shadow: 0 0 35px rgba(239, 68, 68, 0.4); }
    #splash-screen { position: fixed; inset: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.3s ease-out; }
    .splash-logo { max-width: 130px; border-radius: 50%; animation: logoFade 1.2s infinite ease-in-out; }
    @keyframes logoFade { 0%, 100% { opacity: 0.6; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
    #main-page-content { opacity: 0; visibility: hidden; transition: opacity 0.4s ease-in; }
    #main-page-content.visible { opacity: 1; visibility: visible; }
  </style>
</head>
<body>
  <div id="spotlight" aria-hidden="true"></div>
  <div id="splash-screen"><img src="https://raw.githubusercontent.com/ZonaShelWolt/Links/refs/heads/main/PFP.png" alt="לוגו טעינה" class="splash-logo"></div>
  
  <div id="main-page-content" class="flex flex-col items-center px-6 py-12">

    <div class="text-center mb-10 relative z-10">
      <a href="https://kick.com/zswolt" target="_blank" aria-label="מעבר לערוץ הקיק (נפתח בטאב חדש)">
        <div class="relative inline-block">
          <img src="https://raw.githubusercontent.com/ZonaShelWolt/Links/refs/heads/main/PFP.png" id="profile-image" alt="תמונת הפרופיל" class="w-32 h-32 rounded-full mx-auto shadow-2xl mb-4 object-cover border-2 border-white/10 transition-all duration-400">
          <span id="live-dot" class="hidden">
            <span class="absolute bottom-5 right-0 w-4 h-4 rounded-full bg-red-500 border-2 border-[#0f172a]" style="box-shadow: 0 0 8px rgba(239,68,68,0.9);"></span>
            <span class="live-ring absolute bottom-5 right-0 w-4 h-4 rounded-full bg-red-500 border-2 border-[#0f172a]"></span>
          </span>
        </div>
      </a>
      <h1 class="text-4xl font-black text-white tracking-tight">ZSWolt</h1>
      <div class="flex items-center justify-center gap-2 mt-1">
        <span id="live-badge" class="hidden items-center gap-1 bg-red-500/20 border border-red-500/40 text-red-400 text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse inline-block"></span>
          Live
        </span>
        <span id="offline-badge" class="hidden items-center gap-1 bg-white/5 border border-white/20 text-white/40 text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 bg-white/30 rounded-full inline-block"></span>
          Offline
        </span>
        <p class="text-[10px] text-red-400 font-bold tracking-[0.4em] uppercase">Official Links</p>
      </div>
    </div>
    
    <div class="w-full max-w-4xl grid gap-5 mx-auto relative z-10" id="links-grid" dir="ltr">
      <a href="https://discord.gg/g7CnhPJdgT" target="_blank" class="card block rounded-xl p-6 text-center hover:border-indigo-500/40 flex flex-col items-center justify-center" dir="rtl" aria-label="שרת הדיסקורד (נפתח בטאב חדש)">
        <div dir="ltr" class="text-2xl font-black text-indigo-300 flex items-center justify-center gap-2"><img src="https://raw.githubusercontent.com/ZonaShelWolt/Links/refs/heads/main/discor%20logo.png" alt="" class="h-12 w-12" aria-hidden="true">Discord</div>
      </a>
      <a href="https://kick.com/zonashelwolt" target="_blank" class="card block rounded-xl p-6 text-center hover:border-green-500/40" dir="rtl" aria-label="ערוץ הקיק (נפתח בטאב חדש)">
        <div dir="ltr" class="text-2xl font-black text-green-400 flex items-center justify-center gap-2"><img src="https://raw.githubusercontent.com/ZonaShelWolt/Links/refs/heads/main/kick%20logo.png" alt="" class="h-12 w-12" aria-hidden="true">Kick</div>
      </a>
    </div>
    
<footer class="mt-16 pb-8 text-center flex flex-col items-center gap-3 relative z-10 select-none">
      <div class="text-[9px] text-white/20 font-black tracking-[0.2em] uppercase">
        © 2026 ZSWolt <span class="mx-1 text-white/10">|</span> Created By ZSWolt
      </div>
    </footer>
  </div>
  <script>
    // ============ ORIGINAL SCRIPTS ============
    const spotlight = document.getElementById('spotlight');
    const mainContent = document.getElementById('main-page-content');
    const splash = document.getElementById('splash-screen');
    const charLeft = document.getElementById('char-left');
    const charRight = document.getElementById('char-right');

    function activateSite() {
      if (splash) { splash.style.opacity = '0'; setTimeout(() => { splash.style.display = 'none'; mainContent.classList.add('visible'); if (spotlight) spotlight.style.display = 'block'; }, 300); }
    }
    
    document.addEventListener('mousemove', (e) => {
      if (spotlight) { spotlight.style.left = e.clientX + 'px'; spotlight.style.top = e.clientY + 'px'; }
      const x = (window.innerWidth - e.pageX * 2) / 100; const y = (window.innerHeight - e.pageY * 2) / 100;
      if (charLeft) charLeft.style.transform = `translate(${x}px, ${y}px)`;
      if (charRight) charRight.style.transform = `translate(${-x}px, ${-y}px)`;
    });

    window.addEventListener('load', activateSite);
    setTimeout(activateSite, 300);

    async function checkLiveStatus() {
      try {
        const res = await fetch('https://kick.com/api/v2/channels/zswolt');
        const data = await res.json();
        const dot = document.getElementById('live-dot');
        const badge = document.getElementById('live-badge');
        const offlineBadge = document.getElementById('offline-badge');
        if (data?.livestream) {
          dot.classList.remove('hidden'); badge.classList.remove('hidden'); badge.classList.add('flex');
          offlineBadge.classList.add('hidden'); offlineBadge.classList.remove('flex');
        } else {
          dot.classList.add('hidden'); badge.classList.remove('flex'); badge.classList.add('hidden');
          offlineBadge.classList.remove('hidden'); offlineBadge.classList.add('flex');
        }
      } catch (e) {}
    }
    checkLiveStatus();
    setInterval(checkLiveStatus, 60000);

  </script>

</body>
